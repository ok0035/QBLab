backend:
  name: git-gateway
  repo: ok0035/QBLab
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/a2b7b55f-0b4b-45ac-96d0-f7be05c4c7ef/pkce
  auth_token_endpoint: /sites/a2b7b55f-0b4b-45ac-96d0-f7be05c4c7ef/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://qblab.kr

media_folder: "static/images"
public_folder: "/images"

slug:
  encoding: "unicode"
  clean_accents: false

collections:
  # ── 데일리 브리핑 ──────────────────────────
  - name: "posts"
    label: "데일리 브리핑"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    editor:
      preview: true
    sortable_fields: ["date", "title"]
    fields:
      - label: "제목"
        name: "title"
        widget: "string"
      - label: "날짜"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "태그"
        name: "tags"
        widget: "list"
        allow_add: true
        default: ["비트코인", "BTC", "시장분석", "자동매매", "데일리브리핑", "바이낸스"]
      - label: "설명"
        name: "description"
        widget: "text"
      - label: "작성자"
        name: "author"
        widget: "string"
        default: "큐비랩"
      - label: "커버 이미지"
        name: "cover"
        widget: "image"
        required: false
        media_folder: "/static/images/posts"
        public_folder: "/images/posts"
      - label: "초안"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "본문"
        name: "body"
        widget: "markdown"

  # ── 매매내역 ───────────────────────────────
  - name: "trades"
    label: "매매내역"
    folder: "content/trades"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    editor:
      preview: true
    fields:
      - label: "제목"
        name: "title"
        widget: "string"
      - label: "날짜"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "태그"
        name: "tags"
        widget: "list"
        allow_add: true
        default: ["자동매매", "바이낸스", "트레이딩"]
      - label: "설명"
        name: "description"
        widget: "text"
      - label: "작성자"
        name: "author"
        widget: "string"
        default: "큐비랩"
      - label: "초안"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "본문"
        name: "body"
        widget: "markdown"

  # ── 소개 ───────────────────────────────────
  - name: "about"
    label: "소개"
    folder: "content/about"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    editor:
      preview: true
    fields:
      - label: "제목"
        name: "title"
        widget: "string"
      - label: "날짜"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "태그"
        name: "tags"
        widget: "list"
        allow_add: true
      - label: "설명"
        name: "description"
        widget: "text"
      - label: "작성자"
        name: "author"
        widget: "string"
        default: "큐비랩"
      - label: "초안"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "본문"
        name: "body"
        widget: "markdown"
